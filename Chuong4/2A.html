<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script language="JavaScript">
        document.write("<h1>Tạo Button bằng Script</h1><BR>");
        document.write("<BR>");
        function thongbao(txt)
        {
            alert(txt);
        }
    </script>
    <form>
        <input type="button" name="Hello" value="Hello"
        onclick="thongbao('Welcome to JavaScript!')">
    </form>
</body>
</html>
